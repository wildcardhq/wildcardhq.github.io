<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Wildcard — Break the Algorithm</title>
<meta name="description" content="Wildcard is a randomizer for life. When you catch yourself on autopilot, let chance decide instead. Free on the App Store for iPhone & iPad." />
<meta name="theme-color" content="#FF7A00" />
<meta property="og:title" content="Wildcard — Break the Algorithm" />
<meta property="og:description" content="A randomizer for life. Same coffee order, same weekend, same show tonight. Wildcard breaks the loop." />
<meta property="og:type" content="website" />
<link rel="icon" href="img/icon.png" type="image/png" />

<script>
  (function () {
    try {
      var t = localStorage.getItem('wc-theme');
      if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();
</script>

<style>
  :root {
    --orange: #FF7A00;
    --orange-hi: #FFB84D;
    --orange-lo: #FF9905;

    --bg: #F9F9F4;
    --surface: #FFFFFF;
    --ink: #17140F;
    --ink-soft: #635e54;
    --border: rgba(23, 20, 15, 0.10);
    --shadow: rgba(23, 20, 15, 0.22);
    --chip-bg: rgba(255, 122, 0, 0.10);
    --chip-ink: #b4560a;

    --glow-soft: color-mix(in srgb, var(--orange) 12%, transparent);
    --glow-mid: color-mix(in srgb, var(--orange) 6%, var(--bg));
    --glow-footer: color-mix(in srgb, var(--orange) 14%, var(--bg));

    --radius-btn: 16px;

    /* Motion. Durations are Apple's system defaults; curves are the
       CAMediaTimingFunction presets. One gesture = one duration + one curve
       across every property it animates. */
    --dur-hover: 0.2s;    /* pointer feedback */
    --dur-ui: 0.25s;      /* CATransaction default: chrome, colors */
    --dur-reveal: 0.35s;  /* SwiftUI easeInOut default: things entering */
    --dur-emph: 0.5s;     /* sheet-present scale: hero words, card flip */

    --ease-out: cubic-bezier(0, 0, 0.58, 1);       /* CA easeOut — entrances */
    --ease-in-out: cubic-bezier(0.42, 0, 0.58, 1); /* CA easeInEaseOut — state changes */

    --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
            "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  [data-theme="dark"] {
    --bg: #191817;
    --surface: #262423;
    --ink: #F4F1EA;
    --ink-soft: #a49d90;
    --border: rgba(255, 255, 255, 0.10);
    --shadow: rgba(0, 0, 0, 0.55);
    --chip-bg: rgba(255, 122, 0, 0.16);
    --chip-ink: #FFB165;

    --glow-soft: color-mix(in srgb, var(--orange) 16%, transparent);
    --glow-mid: color-mix(in srgb, var(--orange) 8%, var(--bg));
    --glow-footer: color-mix(in srgb, var(--orange) 18%, var(--bg));
  }

  * { box-sizing: border-box; }

  html {
    -webkit-text-size-adjust: 100%;
    background: var(--bg);
  }

  body {
    margin: 0;
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  a { color: inherit; }

  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px clamp(18px, 5vw, 44px);
    padding-top: calc(14px + env(safe-area-inset-top));
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    border-bottom: 1px solid transparent;
    transition:
      border-color var(--dur-ui) var(--ease-in-out),
      background var(--dur-ui) var(--ease-in-out);
  }
  .topbar.scrolled {
    border-bottom-color: var(--border);
    background: var(--bg);
  }

  .wordmark {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.02em;
    text-decoration: none;
  }
  .wordmark-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    display: block;
    box-shadow: 0 1px 4px var(--shadow), 0 0 0 1px var(--border);
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .theme-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink);
    cursor: pointer;
    transition:
      transform var(--dur-hover) var(--ease-in-out),
      background var(--dur-hover) var(--ease-in-out),
      border-color var(--dur-hover) var(--ease-in-out);
  }
  .theme-toggle:hover { transform: translateY(-1px); }
  .theme-toggle:active { transform: scale(.94); }
  .theme-toggle svg { width: 20px; height: 20px; display: block; }
  .theme-toggle .sun { display: none; }
  [data-theme="dark"] .theme-toggle .sun { display: block; }
  [data-theme="dark"] .theme-toggle .moon { display: none; }

  h1 {
    letter-spacing: -0.035em;
    line-height: 1.0;
    margin: 0;
    font-weight: 800;
    font-size: clamp(46px, 9.2vw, 100px);
  }

  /* Hero title: word-by-word clip-up with a held beat on the last word */
  .hero-title {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.22em;
    max-width: 12ch;
    margin-inline: auto;
  }
  .hero-title .word {
    display: inline-block;
    overflow: hidden;
    vertical-align: bottom;
    padding-bottom: 0.06em;
    margin-bottom: -0.06em;
  }
  .hero-title .word-inner {
    display: inline-block;
    opacity: 0;
    transform: translateY(112%);
    animation: word-up var(--dur-emph) var(--ease-out) forwards;
    animation-delay: calc(0.08s + var(--i) * 0.07s);
    will-change: transform, opacity;
  }

  .lede {
    font-size: clamp(18px, 2.7vw, 25px);
    color: var(--ink-soft);
    margin: 34px auto 0;
    line-height: 1.5;
    display: flex;
    justify-content: center;
  }

  .lede-line {
    text-align: center;
    max-width: 36em;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 0.28em 0.35em;
  }

  .lede-chunk {
    display: inline;
    opacity: 1;
    animation: lede-in var(--dur-reveal) var(--ease-out) backwards;
  }
  .lede-chunk--pre {
    animation-delay: 0.6s;
  }
  .lede-chunk--post {
    animation-delay: 0.95s;
  }

  .repeat-stack {
    display: inline-flex;
    align-items: center;
    vertical-align: middle;
    outline: none;
    isolation: isolate;
    /* Room for the tiles to open on hover without touching the words either
       side of the stack. */
    margin-inline: 0.2em;
  }
  .repeat-stack .tile {
    --spread-x: 0em;
    --lift-y: 0em;
    --rot: var(--tile-rot, 0deg);
    flex: none;
    height: 1.85em;
    padding: 0.12em 0.55em 0.12em 0.12em;
    gap: 0.32em;
    border-radius: 0.48em;
    background: #fff;
    border: 1px solid rgba(23, 20, 15, 0.06);
    box-shadow:
      0 2px 6px -2px rgba(23, 20, 15, 0.14),
      0 1px 2px -1px rgba(23, 20, 15, 0.08);
    display: inline-flex;
    align-items: center;
    margin-left: -0.55em;
    opacity: 1;
    transform: translate(var(--spread-x), var(--lift-y)) rotate(var(--rot));
    animation: tile-deal var(--dur-reveal) var(--ease-out) backwards;
    transition:
      transform var(--dur-reveal) var(--ease-in-out),
      box-shadow var(--dur-reveal) var(--ease-in-out);
  }
  .repeat-stack .tile:first-child { margin-left: 0; }
  .repeat-stack .tile:nth-child(1) {
    animation-delay: 0.7s;
    --tile-rot: -5deg;
    z-index: 1;
  }
  .repeat-stack .tile:nth-child(2) {
    animation-delay: 0.78s;
    --tile-rot: 0deg;
    z-index: 2;
  }
  .repeat-stack .tile:nth-child(3) {
    animation-delay: 0.86s;
    --tile-rot: 5deg;
    z-index: 3;
  }
  .repeat-stack .tile img {
    width: 1.45em;
    height: 1.45em;
    object-fit: contain;
    flex: none;
  }
  .repeat-stack .tile-label {
    font-size: 0.68em;
    font-weight: 650;
    letter-spacing: -0.02em;
    color: #17140f;
    white-space: nowrap;
    line-height: 1;
    padding-right: 0.1em;
  }

  /* The stack sits inside a sentence, so opening it spreads the tiles along the
     line and straightens them — it must not leave the baseline. */
  .repeat-stack:hover .tile,
  .repeat-stack:focus-visible .tile {
    --rot: 0deg;
    --lift-y: -0.1em;
    box-shadow:
      0 5px 12px -4px rgba(23, 20, 15, 0.18),
      0 2px 4px -2px rgba(23, 20, 15, 0.10);
  }
  .repeat-stack:hover .tile:nth-child(1),
  .repeat-stack:focus-visible .tile:nth-child(1) {
    --spread-x: -0.4em;
  }
  .repeat-stack:hover .tile:nth-child(3),
  .repeat-stack:focus-visible .tile:nth-child(3) {
    --spread-x: 0.4em;
  }
  .repeat-stack:focus-visible {
    border-radius: 0.6em;
    box-shadow: 0 0 0 3px var(--chip-bg);
  }

  @media (hover: none) {
    .repeat-stack .tile { margin-left: 0.18em; }
    .repeat-stack .tile:first-child { margin-left: 0; }
    .repeat-stack .tile:nth-child(1),
    .repeat-stack .tile:nth-child(2),
    .repeat-stack .tile:nth-child(3) {
      --tile-rot: 0deg;
    }
  }

  .appstore {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    background: var(--ink);
    color: var(--bg);
    padding: 13px 22px 13px 20px;
    border-radius: var(--radius-btn);
    font-weight: 600;
    box-shadow: 0 10px 26px var(--shadow);
    transition:
      transform var(--dur-hover) var(--ease-in-out),
      box-shadow var(--dur-hover) var(--ease-in-out),
      opacity var(--dur-hover) var(--ease-in-out);
  }
  .appstore:hover { transform: translateY(-2px); box-shadow: 0 16px 34px var(--shadow); }
  .appstore:active { transform: scale(.97); opacity: .9; }
  .appstore svg { width: 26px; height: 26px; flex: none; }
  .appstore .lines { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.05; }
  .appstore .small { font-size: 11px; opacity: .8; font-weight: 500; }
  .appstore .big { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; }

  .appstore-top {
    gap: 8px;
    padding: 7px 14px 7px 11px;
    border-radius: 12px;
    box-shadow: 0 4px 14px color-mix(in srgb, var(--shadow) 55%, transparent);
  }
  .appstore-top:hover { transform: translateY(-1px); box-shadow: 0 8px 18px var(--shadow); }
  .appstore-top svg { width: 20px; height: 20px; }
  .appstore-top .small { font-size: 9px; }
  .appstore-top .big { font-size: 15px; }

  @media (max-width: 420px) {
    .appstore-top .small { display: none; }
    .appstore-top { padding: 8px 12px 8px 10px; }
  }

  @keyframes word-up {
    0%   { opacity: 0; transform: translateY(112%); }
    55%  { opacity: 1; }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes lede-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes tile-deal {
    from {
      opacity: 0;
      transform: translate(0, 12px) scale(0.68) rotate(0deg);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .hero-title .word-inner,
    .lede-chunk {
      opacity: 1;
      transform: none;
      animation: none;
    }
    .repeat-stack .tile {
      opacity: 1;
      animation: none;
      transition: none;
      transform: translate(var(--spread-x), var(--lift-y)) rotate(var(--rot));
    }
  }
</style>

<script>
(function () {
  var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

  var root = document.documentElement;
  document.getElementById('themeToggle').addEventListener('click', function () {
    var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try { localStorage.setItem('wc-theme', next); } catch (e) {}
  });

  var topbar = document.getElementById('topbar');
  var onScroll = function () {
    topbar.classList.toggle('scrolled', window.scrollY > 12);
  };
  onScroll();
  window.addEventListener('scroll', onScroll, { passive: true });
})();
</script>
