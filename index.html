<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Wildcard — Break the Algorithm</title>
<meta name="description" content="Wildcard is a randomizer for life. When you catch yourself on autopilot, let chance decide instead. Free on the App Store for iPhone & iPad." />
<meta name="theme-color" content="#FF7A00" />
<meta property="og:title" content="Wildcard — Break the Algorithm" />
<meta property="og:description" content="A randomizer for life. Same coffee order, same weekend, same show tonight. Wildcard breaks the loop." />
<meta property="og:type" content="website" />
<link rel="icon" href="img/icon.png" type="image/png" />

<script>
  (function () {
    try {
      var t = localStorage.getItem('wc-theme');
      if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();
</script>

<style>
  :root {
    --orange: #FF7A00;
    --orange-hi: #FFB84D;
    --orange-lo: #FF9905;

    --bg: #F9F9F4;
    --surface: #FFFFFF;
    --ink: #17140F;
    --ink-soft: #635e54;
    --border: rgba(23, 20, 15, 0.10);
    --shadow: rgba(23, 20, 15, 0.22);
    --chip-bg: rgba(255, 122, 0, 0.10);
    --chip-ink: #b4560a;

    --glow-soft: color-mix(in srgb, var(--orange) 12%, transparent);
    --glow-mid: color-mix(in srgb, var(--orange) 6%, var(--bg));
    --glow-footer: color-mix(in srgb, var(--orange) 14%, var(--bg));

    --radius-btn: 16px;

    --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
            "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  [data-theme="dark"] {
    --bg: #191817;
    --surface: #262423;
    --ink: #F4F1EA;
    --ink-soft: #a49d90;
    --border: rgba(255, 255, 255, 0.10);
    --shadow: rgba(0, 0, 0, 0.55);
    --chip-bg: rgba(255, 122, 0, 0.16);
    --chip-ink: #FFB165;

    --glow-soft: color-mix(in srgb, var(--orange) 16%, transparent);
    --glow-mid: color-mix(in srgb, var(--orange) 8%, var(--bg));
    --glow-footer: color-mix(in srgb, var(--orange) 18%, var(--bg));
  }

  * { box-sizing: border-box; }

  html {
    -webkit-text-size-adjust: 100%;
    background: var(--bg);
  }

  body {
    margin: 0;
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  a { color: inherit; }

  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px clamp(18px, 5vw, 44px);
    padding-top: calc(14px + env(safe-area-inset-top));
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    border-bottom: 1px solid transparent;
    transition: border-color .3s ease, background .3s ease;
  }
  .topbar.scrolled {
    border-bottom-color: var(--border);
    background: var(--bg);
  }

  .wordmark {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.02em;
    text-decoration: none;
  }
  .wordmark-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    display: block;
    box-shadow: 0 1px 4px var(--shadow), 0 0 0 1px var(--border);
  }

  .theme-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink);
    cursor: pointer;
    transition: transform .18s ease, background .2s ease, border-color .2s ease;
  }
  .theme-toggle:hover { transform: translateY(-1px); }
  .theme-toggle:active { transform: scale(.94); }
  .theme-toggle svg { width: 20px; height: 20px; display: block; }
  .theme-toggle .sun { display: none; }
  [data-theme="dark"] .theme-toggle .sun { display: block; }
  [data-theme="dark"] .theme-toggle .moon { display: none; }

  h1 {
    letter-spacing: -0.035em;
    line-height: 1.0;
    margin: 0;
    font-weight: 800;
    font-size: clamp(46px, 9.2vw, 100px);
  }

  .lede {
    font-size: clamp(18px, 2.7vw, 25px);
    color: var(--ink-soft);
    margin: 34px auto 0;
    line-height: 1.5;
    display: flex;
    justify-content: center;
  }

  .lede-line {
    text-align: center;
    max-width: 34em;
  }

  .repeat-stack {
    display: inline-flex;
    align-items: center;
    vertical-align: middle;
    margin: 0 0.28em;
    outline: none;
  }
  .repeat-stack .tile {
    width: 1.9em;
    height: 1.9em;
    flex: none;
    border-radius: 0.46em;
    background: #fff;
    border: 1px solid rgba(23, 20, 15, 0.06);
    box-shadow: 0 6px 16px -4px rgba(23, 20, 15, 0.30), 0 2px 5px -2px rgba(23, 20, 15, 0.16);
    display: grid;
    place-items: center;
    margin-left: -0.82em;
    transition: transform .36s cubic-bezier(.2,.7,.2,1), margin-left .36s cubic-bezier(.2,.7,.2,1);
    will-change: transform;
  }
  .repeat-stack .tile:first-child { margin-left: 0; }
  .repeat-stack .tile:nth-child(1) { transform: rotate(-8deg); z-index: 1; }
  .repeat-stack .tile:nth-child(2) { transform: rotate(3deg); z-index: 2; }
  .repeat-stack .tile:nth-child(3) { transform: rotate(9deg); z-index: 3; }
  .repeat-stack .tile img {
    width: 74%;
    height: 74%;
    object-fit: contain;
  }
  .repeat-stack:hover .tile,
  .repeat-stack:focus-visible .tile {
    margin-left: 0.3em;
    transform: rotate(0deg) translateY(-2px);
  }
  .repeat-stack:hover .tile:first-child,
  .repeat-stack:focus-visible .tile:first-child { margin-left: 0; }
  .repeat-stack:focus-visible { box-shadow: 0 0 0 3px var(--chip-bg); border-radius: 0.6em; }

  @media (hover: none) {
    .repeat-stack .tile { margin-left: 0.22em; transform: rotate(0deg); }
    .repeat-stack .tile:first-child { margin-left: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .repeat-stack .tile { transition: none; }
  }

  .appstore,
  .hero-cta {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    background: var(--ink);
    color: var(--bg);
    padding: 13px 22px 13px 20px;
    border-radius: var(--radius-btn);
    font-weight: 600;
    box-shadow: 0 10px 26px var(--shadow);
    transition: transform .16s ease, box-shadow .2s ease, opacity .16s ease;
  }
  .appstore:hover,
  .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 16px 34px var(--shadow); }
  .appstore:active,
  .hero-cta:active { transform: scale(.97); opacity: .9; }
  .appstore svg,
  .hero-cta svg { width: 26px; height: 26px; }
  .appstore .lines,
  .hero-cta .lines { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.05; }
  .appstore .small,
  .hero-cta .small { font-size: 11px; opacity: .8; font-weight: 500; }
  .appstore .big,
  .hero-cta .big { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; }

  .rise {
    opacity: 0;
    transform: translateY(22px);
    animation: rise .8s cubic-bezier(.2,.7,.2,1) forwards;
  }
  .rise-1 { animation-delay: .05s; }
  .rise-2 { animation-delay: .15s; }
  .rise-3 { animation-delay: .25s; }
  .rise-4 { animation-delay: .35s; }
  @keyframes rise { to { opacity: 1; transform: none; } }

  @media (prefers-reduced-motion: reduce) {
    .rise { opacity: 1; transform: none; animation: none; }
    .cycler { transition: none; }
  }
</style>

</head>
<body>

<script>
(function () {
  var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

  var root = document.documentElement;
  document.getElementById('themeToggle').addEventListener('click', function () {
    var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try { localStorage.setItem('wc-theme', next); } catch (e) {}
  });

  var topbar = document.getElementById('topbar');
  var heroCta = document.getElementById('heroCta');
  var onScroll = function () {
    topbar.classList.toggle('scrolled', window.scrollY > 12);
    if (heroCta) heroCta.classList.toggle('is-hidden', window.scrollY > 64);
  };
  onScroll();
  window.addEventListener('scroll', onScroll, { passive: true });
})();
</script>
